<!doctype html>
<!--
  SEO Tool — status panel (cross-platform).

  Lives at the install root. Browsers WILL NOT execute local .cmd /
  .sh files from a button click — that's a hard security boundary
  every modern browser enforces. So this page is honest about it:
  - On Windows: tells you to use SEO Tool.hta (real working buttons)
    or double-click "Start SEO Tool.cmd" in this folder.
  - On macOS / Linux: tells you to double-click
    "Start SEO Tool.command" or run bin/START.sh.
  - The Open button DOES work — once the server is running, click it
    to jump to the app.

  Port discovery: probes a list of common dev ports + the start of
  the IANA ephemeral range. URL hash override #port=63140 skips the
  scan for power users.

  Port-agnostic — no template substitution needed. Works on any
  install committed at the repo root.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SEO Tool — Status</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%237c3aed' d='M12 2L4 6v6c0 5 4 9 8 10 4-1 8-5 8-10V6l-8-4zm0 6l2 4h-4l2-4z'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0a0a14;
        --card: #14141f;
        --border: #2a2a3a;
        --text: #e6e6f0;
        --muted: #8a8aa0;
        --primary: #8b5cf6;
        --primary-hover: #a78bfa;
        --success: #10b981;
        --danger: #f43f5e;
        --warn: #f59e0b;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8f9fc;
          --card: #ffffff;
          --border: #e4e6f0;
          --text: #1a1a2e;
          --muted: #5c5c75;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(ellipse at top left, rgba(139,92,246,0.15), transparent 60%),
          radial-gradient(ellipse at bottom right, rgba(16,185,129,0.1), transparent 60%),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
        min-height: 100vh;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 36px;
        max-width: 460px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      }
      .header { text-align: center; margin-bottom: 24px; }
      .logo {
        width: 52px; height: 52px; margin: 0 auto 14px;
        background: linear-gradient(135deg, var(--primary), var(--success));
        border-radius: 13px;
        display: grid; place-items: center;
        color: white; font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      }
      h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
      .subtitle { color: var(--muted); font-size: 13px; margin: 0; }
      .status {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 7px 13px; border-radius: 999px;
        font-size: 12px; font-weight: 600;
        margin: 16px 0 4px;
        background: rgba(245,158,11,0.12); color: var(--warn);
        border: 1px solid rgba(245,158,11,0.3);
      }
      .status.up {
        background: rgba(16,185,129,0.12); color: var(--success);
        border-color: rgba(16,185,129,0.3);
      }
      .status.down {
        background: rgba(244,63,94,0.12); color: var(--danger);
        border-color: rgba(244,63,94,0.3);
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: currentColor;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 10px; width: 100%;
        padding: 14px 20px;
        border: none; border-radius: 10px;
        font-size: 15px; font-weight: 600;
        cursor: pointer; text-decoration: none;
        transition: all 0.15s;
        font-family: inherit;
        color: white;
        background: var(--primary);
        margin-top: 6px;
      }
      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(139,92,246,0.3);
      }
      .btn[aria-disabled="true"] {
        opacity: 0.4; cursor: not-allowed; pointer-events: none;
      }
      .instructions {
        margin-top: 18px;
        padding: 14px 16px;
        background: rgba(139, 92, 246, 0.08);
        border: 1px solid rgba(139, 92, 246, 0.25);
        border-radius: 10px;
        font-size: 12px;
        color: var(--text);
        line-height: 1.6;
      }
      .instructions strong {
        color: var(--primary-hover);
        display: block;
        margin-bottom: 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .instructions code {
        background: rgba(0,0,0,0.3);
        padding: 1px 5px;
        border-radius: 4px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
      }
      .footer {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }
      .footer a {
        color: var(--primary-hover);
        text-decoration: none;
      }
      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="header">
        <div class="logo">SEO</div>
        <h1>SEO Tool</h1>
        <p class="subtitle">All-in-one free SEO platform</p>
        <div id="status" class="status">
          <span class="dot"></span>
          <span id="statusText">Scanning for server…</span>
        </div>
      </div>

      <a id="openBtn" class="btn" href="#" aria-disabled="true">
        Open SEO Tool →
      </a>

      <div class="instructions">
        <strong id="instTitle">How to start the server</strong>
        <div id="instBody">Loading…</div>
      </div>

      <div class="footer">
        <a href="https://github.com/IamRamgarhia/SEO-Tool" target="_blank">GitHub</a>
        &middot;
        <a href="https://github.com/IamRamgarhia/SEO-Tool/issues" target="_blank">Issues</a>
      </div>
    </main>

    <script>
      // Detect OS once
      var UA = navigator.userAgent || "";
      var IS_WIN  = /Windows/i.test(UA);
      var IS_MAC  = /Mac OS X/i.test(UA);
      // Show the right instructions for the OS — honest about the
      // browser-security limit (HTML pages can't execute local .cmd /
      // .sh files; the OS needs to handle the double-click).
      var instTitle = document.getElementById("instTitle");
      var instBody  = document.getElementById("instBody");
      if (IS_WIN) {
        instTitle.textContent = "On Windows — go to the launcher folder";
        instBody.innerHTML =
          'Open the <code>launcher/</code> folder next to this file, then:<br>' +
          '1. Double-click <code>SEO Tool.hta</code> — real working Start / Stop buttons in a small window.<br>' +
          '2. Or double-click <code>Start SEO Tool.cmd</code> / <code>Stop SEO Tool.cmd</code> directly.<br>' +
          '<em>Browsers can&rsquo;t run .cmd files from a button click for security reasons — that&rsquo;s why all the executable launcher files live in their own folder.</em><br>' +
          '<a id="openLauncherDir" href="launcher/" target="_blank">Open launcher folder →</a>';
      } else if (IS_MAC) {
        instTitle.textContent = "On macOS — open the launcher folder";
        instBody.innerHTML =
          'Open the <code>launcher/</code> folder next to this file and double-click <code>Start SEO Tool.command</code> / <code>Stop SEO Tool.command</code>.<br>' +
          'First time only: right-click → Open → Open (macOS Gatekeeper prompt).<br>' +
          '<a id="openLauncherDir" href="launcher/" target="_blank">Open launcher folder →</a>';
      } else {
        instTitle.textContent = "On Linux — run from terminal";
        instBody.innerHTML =
          'In this folder, run:<br>' +
          '<code>./bin/START.sh</code> to start, <code>./bin/STOP.sh</code> to stop.<br>' +
          'Or use <code>launcher/Start SEO Tool.command</code> if your file manager supports running it.';
      }

      // Port discovery (probe likely ports)
      var HASH_PORT = (location.hash.match(/port=(\d+)/) || [])[1];
      var COMMON = ["3000","3001","3002","3010","5000","5173","4000","8080","8081"];
      var EPHEMERAL = [];
      for (var i = 0; i < 30; i++) EPHEMERAL.push(String(49152 + i));
      var PORTS = HASH_PORT ? [HASH_PORT].concat(COMMON).concat(EPHEMERAL) : COMMON.concat(EPHEMERAL);

      var $status = document.getElementById("status");
      var $statusText = document.getElementById("statusText");
      var $openBtn = document.getElementById("openBtn");
      var currentPort = null;
      var pollMs = 2000;
      var wasDown = false;

      async function probe(port) {
        try {
          const ctl = new AbortController();
          const tid = setTimeout(() => ctl.abort(), 800);
          const res = await fetch("http://localhost:" + port + "/api/v1/health", {
            cache: "no-store",
            signal: ctl.signal,
          });
          clearTimeout(tid);
          if (!res.ok) return false;
          const body = await res.json().catch(() => null);
          return body && body.service === "seo-tool";
        } catch (_) {
          return false;
        }
      }

      async function find() {
        const BATCH = 4;
        for (let i = 0; i < PORTS.length; i += BATCH) {
          const batch = PORTS.slice(i, i + BATCH);
          const results = await Promise.all(batch.map((p) => probe(p)));
          for (let j = 0; j < batch.length; j++) {
            if (results[j]) return batch[j];
          }
        }
        return null;
      }

      function setUp(port) {
        currentPort = port;
        const url = "http://localhost:" + port;
        $status.className = "status up";
        $statusText.textContent = "Running on port " + port;
        $openBtn.setAttribute("aria-disabled", "false");
        $openBtn.href = url;
        pollMs = 5000;
        if (wasDown) {
          wasDown = false;
          setTimeout(() => { window.location.href = url; }, 600);
        }
      }
      function setDown() {
        currentPort = null;
        $status.className = "status down";
        $statusText.textContent = "Not running — use the file below";
        $openBtn.setAttribute("aria-disabled", "true");
        $openBtn.removeAttribute("href");
        pollMs = 2000;
        wasDown = true;
      }

      $openBtn.addEventListener("click", (e) => {
        if ($openBtn.getAttribute("aria-disabled") === "true") {
          e.preventDefault();
        }
      });

      async function tick() {
        if (currentPort) {
          if (await probe(currentPort)) setUp(currentPort); else setDown();
          return;
        }
        $statusText.textContent = "Scanning for server…";
        const p = await find();
        if (p) setUp(p); else setDown();
      }
      tick();
      setInterval(tick, pollMs);
    </script>
  </body>
</html>
